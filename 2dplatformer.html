<htmls>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2D godot platformer</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #hero {
      padding: 140px 0 48px;
    }

    .visualizer-wrapper {
      border-top: 1px solid var(--border);
      padding: 48px 0;
    }

    .upload-label {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.78rem;
      letter-spacing: 0.03em;
      padding: 0.6rem 1.2rem;
      border-radius: 3px;
      background: var(--ink);
      color: var(--bg);
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 2rem;
    }

    .upload-label:hover { background: var(--accent); }

    #audio { display: none; }

    canvas {
      display: block;
      width: 100%;
      height: 160px;
      border-radius: 3px;
      background: #111;
    }

    /* ── Slideshow ── */
    .slideshow-wrapper {
      border-top: 1px solid var(--border);
      padding: 48px 0;
    }

    .slideshow {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .slideshow img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .slideshow img.active { opacity: 1; }

    .slideshow-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .slide-btn {
      font-family: var(--mono);
      font-size: 0.78rem;
      padding: 0.5rem 1rem;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .slide-btn:hover { color: var(--ink); border-color: var(--ink); }

    .slide-counter {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .slide-dots {
      display: flex;
      gap: 0.4rem;
      margin-left: auto;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }

    .dot.active { background: var(--ink); }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <a class="nav-logo" href="portfolio.html">← back</a>
    </div>
  </nav>

  <section id="hero">
    <div class="container">
      <span class="tag">Project</span>
      <h1>2D platformer</h1>
      <p class="hero-bio">
        description
      </p>
    </div>
  </section>

  <section class="slideshow-wrapper">
    <div class="container">
      <p class="section-label">Screenshots</p>
      <div class="slideshow" id="slideshow">
        <img src="C:\Users\rocke\OneDrive\Desktop\Coderclass folder\Portfolio\Rocket-Kiers-Portfolio\assets\screenshot_platformer_1.jpg" alt="Screenshot 1" class="active">
        <img src="C:\Users\rocke\OneDrive\Desktop\Coderclass folder\Portfolio\Rocket-Kiers-Portfolio\assets\screenshot_platformer_2.jpg" alt="Screenshot 2">
        <img src="C:\Users\rocke\OneDrive\Desktop\Coderclass folder\Portfolio\Rocket-Kiers-Portfolio\assets\screenshot_platformer_3.jpg" alt="Screenshot 3">
        <img src="C:\Users\rocke\OneDrive\Desktop\Coderclass folder\Portfolio\Rocket-Kiers-Portfolio\assets\screenshot_platformer_4.jpg" alt="Screenshot 4">
        <img src="C:\Users\rocke\OneDrive\Desktop\Coderclass folder\Portfolio\Rocket-Kiers-Portfolio\assets\screenshot_platformer_5.jpg" alt="Screenshot 5">        
      </div>
      <div class="slideshow-controls">
        <button class="slide-btn" id="prev">← prev</button>
        <button class="slide-btn" id="next">next →</button>
        <span class="slide-counter" id="counter">1 / 5</span>
        <div class="slide-dots" id="dots"></div>
      </div>
    </div>
  </section>

</body>
<script>
  const slides = document.querySelectorAll('.slideshow img');
  const counter = document.getElementById('counter');
  const dotsContainer = document.getElementById('dots');
  let current = 0;

  slides.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.classList.add('dot');
    if (i === 0) dot.classList.add('active');
    dot.addEventListener('click', () => goTo(i));
    dotsContainer.appendChild(dot);
  });

    function goTo(index) {
    slides[current].classList.remove('active');
    dotsContainer.children[current].classList.remove('active');
    current = (index + slides.length) % slides.length;
    slides[current].classList.add('active');
    dotsContainer.children[current].classList.add('active');
    counter.textContent = `${current + 1} / ${slides.length}`;
 }

  document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
  document.getElementById('next').addEventListener('click', () => goTo(current + 1));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') goTo(current - 1);
    if (e.key === 'ArrowRight') goTo(current + 1);
  });
</script>
</html>
