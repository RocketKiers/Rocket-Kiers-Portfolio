<html lang>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audio Visualizer</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #hero {
      padding: 140px 0 48px;
    }

    .visualizer-wrapper {
      border-top: 1px solid var(--border);
      padding: 48px 0;
    }

    .upload-label {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.78rem;
      letter-spacing: 0.03em;
      padding: 0.6rem 1.2rem;
      border-radius: 3px;
      background: var(--ink);
      color: var(--bg);
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 2rem;
    }

    .upload-label:hover { background: var(--accent); }

    #audio { display: none; }

    canvas {
      display: block;
      width: 100%;
      height: 160px;
      border-radius: 3px;
      background: #111;
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <a class="nav-logo" href="index.html">← back</a>
    </div>
  </nav>

  <section id="hero">
    <div class="container">
      <span class="tag">Project</span>
      <h1>Audio Visualizer</h1>
      <p class="hero-bio">
        description
      </p>
    </div>
  </section>

  <section class="visualizer-wrapper">
    <div class="container">
      <p class="section-label">Try it</p>
      <label class="upload-label" for="audio">Upload audio file</label>
      <input type="file" accept="audio/*" id="audio">
      <canvas id="canvas"></canvas>
    </div>
  </section>

</body>
<script src="script.js"></script>
</html>
